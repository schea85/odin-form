    <div class="container">
        <div class="left">
            <div class="logos-centered">
                <img src="images/odin_form_logo.png" alt="odin logo">
                <h1>ODIN</h1>
            </div>
        </div>
            

        <div class="right">
            <div class="top-right">
                <p>This is not a real online service!  You know you need something like this in your life to help you realize your deepest dreams.  Sign up <span class="italic">now</span> to get started.</p>
                <p>You <span class="italic">know</span> you want to.</p>
            </div>

            <div class="fieldset-container">
                <p>Let's do this!</p>

                <fieldset>
                    <form action="POST">
                        <label for="first-name">First Name
                            <input type="text" id="first-name" required />
                        </label>

                        <label for="last-name">Last Name
                            <input type="text" id="last-name" required />
                        </label>

                        <label for="email">Email
                            <input type="email" id="email" required />
                        </label>

                        <label for="phone-number">Phone Number
                            <input type="tel" id="phone-number" min="10" max="11" required />
                        </label>

                        <label for="password">Password
                            <input type="password" id="password" required />
                        </label>

                        <label for="confirm-password">Confirm Password
                            <input type="password" id="confirm-password" required />
                        </label>
                        
                    </form>
                </fieldset>
            </div>

            <div class="bottom-right">
                <button>Create Account</button>
                <p>Already have an account?  <span class="green-link"><a href="">Log in</a></span></p>
            </div>
        </div>

    </div><!--end of container-->

    <div class="credit-container">
        <p class="left-bottom">Photo by Halie West on <a href="https://unsplash.com" target="_blank">Unsplash</a></p>
    </div>

</body>
